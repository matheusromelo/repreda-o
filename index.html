<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redação App - Flashcards</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #f4f4f7;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #7b2cff;
            --sidebar: #1a1a1d;
            --input: #eee;
        }

        .dark {
            --bg: #0f0f0f;
            --card: #1c1c1c;
            --text: #ffffff;
            --primary: #9b5cff;
            --sidebar: #141416;
            --input: #2a2a2a;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        body { display: flex; min-height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 230px; background: var(--sidebar);
            padding: 20px 10px; transition: all 0.3s ease;
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar.collapsed { width: 80px; align-items: center; }
        .logo { text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 25px; font-size: 18px; width: 100%; }
        .sidebar.collapsed .logo::before { content: 'R'; font-size: 26px; }
        .sidebar.collapsed .logo span { display: none; }

        .menu { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .menu button {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: none; 
            background: none; color: #ccc; border-radius: 12px; cursor: pointer; transition: 0.2s;
            width: 100%; height: 48px; white-space: nowrap;
        }
        .sidebar.collapsed .menu button { justify-content: center; padding: 12px 0; }
        .menu button span:first-child { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
        .menu button:hover { background: #2a2a2f; color: white; }
        .menu button.active { background: var(--primary); color: white; font-weight: bold; }
        .sidebar.collapsed button span:last-child { display: none; }

        /* --- CONTEÚDO --- */
        .main { flex: 1; padding: 20px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .topbar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; align-items: center; }
        .icon-btn { padding: 10px 15px; border: none; border-radius: 10px; background: var(--card); color: var(--text); cursor: pointer; }
        
        .search { width: 100%; padding: 14px; margin-bottom: 20px; border: none; border-radius: 12px; background: var(--input); color: var(--text); font-size: 16px; }
        
        /* Seções */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Formulário e Cards */
        .form { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; margin-top: 12px; padding: 12px; border: none; border-radius: 10px; background: var(--input); color: var(--text); font-size: 15px; }
        .form button { width: 100%; margin-top: 15px; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; cursor: pointer; border: 1px solid rgba(0,0,0,0.03); }
        .status-dots { display: flex; gap: 8px; margin-bottom: 10px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; opacity: 0.3; }
        .dot.active { opacity: 1; }
        .red { background: #dc2626; } .yellow { background: #eab308; } .green { background: #16a34a; }

        /* --- FLASHCARDS UI --- */
        .flashcard-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px; }
        .flashcard {
            width: 100%; max-width: 400px; min-height: 250px;
            background: var(--card); border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 30px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid var(--primary); transition: 0.3s;
        }
        .flashcard.reveal { border-color: #16a34a; }
        .flashcard h2 { font-size: 22px; margin-bottom: 10px; }
        .flashcard p { font-size: 16px; color: var(--text); line-height: 1.5; }
        .flash-controls { display: flex; gap: 15px; width: 100%; max-width: 400px; }
        .flash-controls button { flex: 1; padding: 15px; border-radius: 12px; border: none; background: var(--card); color: var(--text); font-weight: bold; cursor: pointer; border: 1px solid var(--input); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -230px; height: 100vh; box-shadow: none; }
            .sidebar.active { left: 0; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
            .overlay.active { display: block; }
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; padding: 15px; z-index: 200; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; }
    </style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="logo"><span>Redação</span></div>
    <div class="menu">
        <button class="active" onclick="switchTab('home', this)"><span>🏠</span> <span>Home</span></button>
        <button onclick="switchTab('flashcards', this)"><span>🔥</span> <span>Flashcards</span></button>
        <hr style="opacity: 0.1; margin: 10px 0;">
        <button onclick="setFiltro(this,'Direitos Humanos')"><span>🌍</span> <span>Direitos</span></button>
        <button onclick="setFiltro(this,'Educação')"><span>🎓</span> <span>Educação</span></button>
        <button onclick="setFiltro(this,'Tecnologia')"><span>💻</span> <span>Tecno</span></button>
        <button onclick="setFiltro(this,'Saúde')"><span>❤️</span> <span>Saúde</span></button>
        <button onclick="setFiltro(this,'Meio Ambiente')"><span>🌱</span> <span>Ambient</span></button>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <button class="icon-btn" onclick="toggleMenu()">☰</button>
        <div style="display: flex; gap: 8px;">
            <button class="icon-btn" onclick="toggleTema()">🌙</button>
            <button class="icon-btn" id="btnLogin" onclick="handleAuth()" style="background: var(--primary); color: white;">Login</button>
        </div>
    </div>

    <div id="tab-home" class="section active">
        <input class="search" id="busca" placeholder="Pesquisar..." oninput="render()">
        <div class="form">
            <input id="titulo" placeholder="Título">
            <select id="categoria">
                <option>Direitos Humanos</option><option>Educação</option>
                <option>Tecnologia</option><option>Saúde</option><option>Meio Ambiente</option>
            </select>
            <textarea id="descricao" rows="3" placeholder="Descrição do repertório..."></textarea>
            <button onclick="salvar()">Adicionar Repertório</button>
        </div>
        <div class="grid" id="lista"></div>
    </div>

    <div id="tab-flashcards" class="section">
        <h2 style="text-align: center;">Revisão Ativa</h2>
        <p style="text-align: center; opacity: 0.7;">Tente lembrar o conteúdo antes de clicar no card.</p>
        
        <div class="flashcard-container">
            <div class="flashcard" id="flash-card" onclick="revealFlash()">
                <h2 id="flash-titulo">Carregando...</h2>
                <p id="flash-conteudo" style="display: none;"></p>
                <small id="flash-hint" style="opacity: 0.5; margin-top: 20px;">(Clique para revelar)</small>
            </div>
            <div class="flash-controls">
                <button onclick="prevFlash()">Anterior</button>
                <button onclick="nextFlash()" style="background: var(--primary); color: white; border: none;">Próximo</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="modal" onclick="fechar(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="mTitulo"></h3>
        <p id="mCategoria" style="color:var(--primary); font-size: 14px; margin: 10px 0;"></p>
        <div id="mDescricao" style="line-height: 1.6; white-space: pre-wrap;"></div>
        <button onclick="deletar()" style="margin-top: 20px; width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 8px;">Excluir</button>
    </div>
</div>

<script>
    // Configurações Globais
    let dados = [];
    let filtroAtual = "Todos";
    let flashIndex = 0;
    let userLogado = null;

    // --- INTERFACE ---
    function switchTab(tabId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'flashcards') initFlashcards();
        if(window.innerWidth <= 768) toggleMenu();
    }

    function toggleMenu() {
        const s = document.getElementById("sidebar"), o = document.getElementById("overlay");
        if (window.innerWidth <= 768) { s.classList.toggle("active"); o.classList.toggle("active"); } 
        else { s.classList.toggle("collapsed"); }
    }

    function toggleTema() { document.body.classList.toggle("dark"); }

    // --- FLASHCARDS LOGIC ---
    function initFlashcards() {
        if(dados.length === 0) {
            document.getElementById('flash-titulo').innerText = "Nenhum card salvo";
            document.getElementById('flash-hint').innerText = "Adicione repertórios primeiro";
            return;
        }
        flashIndex = 0;
        updateFlashUI();
    }

    function revealFlash() {
        const card = document.getElementById('flash-card');
        const conteudo = document.getElementById('flash-conteudo');
        const hint = document.getElementById('flash-hint');
        card.classList.toggle('reveal');
        conteudo.style.display = conteudo.style.display === 'none' ? 'block' : 'none';
        hint.style.display = conteudo.style.display === 'none' ? 'block' : 'none';
    }

    function updateFlashUI() {
        const r = dados[flashIndex];
        document.getElementById('flash-titulo').innerText = r.titulo;
        document.getElementById('flash-conteudo').innerText = r.descricao;
        document.getElementById('flash-conteudo').style.display = 'none';
        document.getElementById('flash-hint').style.display = 'block';
        document.getElementById('flash-card').classList.remove('reveal');
    }

    function nextFlash() {
        if(flashIndex < dados.length - 1) { flashIndex++; updateFlashUI(); }
        else { flashIndex = 0; updateFlashUI(); }
    }

    function prevFlash() {
        if(flashIndex > 0) { flashIndex--; updateFlashUI(); }
    }

    // --- FIREBASE & CORE ---
   const firebaseConfig = {
  apiKey: "AIzaSyBxm6ENo7qiMKPCLwsCBHKTH37Wov5CNLI",
  authDomain: "redacaorep.firebaseapp.com",
  projectId: "redacaorep",
  storageBucket: "redacaorep.firebasestorage.app",
  messagingSenderId: "959438351648",
  appId: "1:959438351648:web:e72096f67a7ea37257bb45",
  measurementId: "G-WCSMVK7V02"
};

    auth.onAuthStateChanged(user => {
        userLogado = user;
        if (user) {
            document.getElementById("btnLogin").innerText = "Sair";
            db.collection("repertorios").where("userId", "==", user.uid).onSnapshot(snap => {
                dados = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });
        } else {
            document.getElementById("btnLogin").innerText = "Login";
            dados = JSON.parse(localStorage.getItem("reps")) || [];
            render();
        }
    });

    function handleAuth() {
        if (userLogado) auth.signOut();
        else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    async function salvar() {
        const t = document.getElementById("titulo"), d = document.getElementById("descricao"), c = document.getElementById("categoria");
        if(!t.value || !d.value) return;
        const novo = { titulo: t.value, categoria: c.value, descricao: d.value, status: "medio", data: Date.now() };
        if (userLogado) {
            novo.userId = userLogado.uid;
            await db.collection("repertorios").add(novo);
        } else {
            dados.push(novo);
            localStorage.setItem("reps", JSON.stringify(dados));
            render();
        }
        t.value = ""; d.value = "";
    }

    function render() {
        const lista = document.getElementById("lista");
        const busca = document.getElementById("busca").value.toLowerCase();
        lista.innerHTML = "";
        dados.forEach((r, i) => {
            if(filtroAtual !== "Todos" && r.categoria !== filtroAtual) return;
            if(!r.titulo.toLowerCase().includes(busca)) return;
            lista.innerHTML += `<div class="card" onclick="abrir(${i})"><h3>${r.titulo}</h3><p style="font-size:12px;opacity:0.6">${r.categoria}</p></div>`;
        });
    }

    function setFiltro(btn, cat) {
        filtroAtual = cat;
        render();
        switchTab('home', document.querySelector('.menu button:first-child'));
    }

    function abrir(i) {
        const r = dados[i];
        indexAtual = i;
        mTitulo.innerText = r.titulo;
        mCategoria.innerText = r.categoria;
        mDescricao.innerText = r.descricao;
        modal.style.display = "flex";
    }

    function fechar(e) { if(!e || e.target.id === "modal") modal.style.display = "none"; }

    async function deletar() {
        if(!confirm("Excluir?")) return;
        if (userLogado) await db.collection("repertorios").doc(dados[indexAtual].id).delete();
        else { dados.splice(indexAtual, 1); localStorage.setItem("reps", JSON.stringify(dados)); }
        fechar(); render();
    }

    render();
</script>
</body>
</html>
